
services:
  # Backend Service Configuration
  backend:
    build: ./backend # Specifies the directory containing the Dockerfile
    container_name: backend_service
    restart: always
    networks:
      - app-network # Connects to the custom network
    ports:
      - "5000:5000" # Exposes port 5000 on the host
    environment:
      # These variables will be loaded from the .env file in the project root
      - PORT=5000
      - NODE_ENV=${NODE_ENV}
      - MONGODB_URI=${MONGODB_URI} # Should be mongodb://mongo:27017/your_db_name
      - JWT_SECRET=${JWT_SECRET}
      # Add any other environment variables your backend needs
    volumes:
      - ./backend:/app # Mount local backend code into container
      - /app/node_modules # Use container's node_modules, not host's
    depends_on:
      - mongo # Ensures mongo starts before backend

  # SRS Service Configuration
  srs:
    image: ossrs/srs:5
    container_name: srs_media_server
    restart: always
    networks:
      - app-network # Connects to the custom network
    ports:
      - "1935:1935" # RTMP
      - "8080:8080" # HTTP-FLV, HLS
      - "1985:1985" # HTTP API
      - "8000:8000/udp" # WebRTC over UDP
    volumes:
      - ./srs.conf:/usr/local/srs/conf/srs.conf
    depends_on: # Ensures backend starts before SRS tries to connect (though SRS handles failures)
      - backend

  # MongoDB Service Configuration
  mongo:
    image: mongo:latest
    container_name: mongodb
    restart: always
    networks:
      - app-network
    volumes:
      - mongo-data:/data/db # Persists data
    environment:
      # Define root user and password via .env file
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASS}
    # ports: # Uncomment if you need to access MongoDB directly from your host machine
    #   - "27017:27017"

# Define the custom network
networks:
  app-network:
    driver: bridge

# Define volumes
volumes:
  mongo-data:
    driver: local
